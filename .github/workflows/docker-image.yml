name: Docker Image CI

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/finnimon/wbmcs-api:latest .

      # 4. Push Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/finnimon/wbmcs-api:latest
